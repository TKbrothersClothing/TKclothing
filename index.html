<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TK Clothing</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0a0a0a;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#000;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:100;
}

.logo img{
height:40px;
}

nav a{
margin:0 15px;
color:#bbb;
text-decoration:none;
}

nav a:hover{
color:white;
}

.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
background:rgba(0,0,0,0.6);
padding:20px 40px;
}

.section{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

h2{
font-size:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #222;
text-align:center;
}

.card img{
max-width:200px;
margin-bottom:10px;
}

.product{
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #222;
text-align:center;
}

.product-logo{
height:60px;
margin:10px auto;
}

.price{
margin:10px 0;
font-weight:bold;
}

button{
padding:10px 20px;
border:none;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f1cf5d;
}

.cart{
position:fixed;
right:0;
top:0;
width:320px;
height:100vh;
background:#111;
border-left:1px solid #222;
padding:20px;
transform:translateX(100%);
transition:0.3s;
overflow:auto;
}

.cart.open{
transform:translateX(0);
}

.cart-item{
border-bottom:1px solid #222;
padding:10px 0;
}

footer{
text-align:center;
padding:40px;
border-top:1px solid #222;
margin-top:80px;
color:#888;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
.hero h1{
font-size:40px;
}
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="data:image/jpeg;base64,REPLACED_LOGO1">
</div>

<nav>
<a href="#home">Home</a>
<a href="#logos">Logos</a>
<a href="#shop">Shop</a>
<a href="#checkout">Checkout</a>
</nav>

<button onclick="toggleCart()">Cart</button>

</header>

<section class="hero" id="home"
style="background-image:url('data:image/jpeg;base64,REPLACED_BANNER')">

<h1>TK CLOTHING</h1>

</section>

<section class="section" id="logos">

<h2>Your Logos</h2>

<div class="grid">

<div class="card">
<img src="data:image/jpeg;base64,REPLACED_LOGO1">
<p>Luxury Logo</p>
</div>

<div class="card">
<img src="data:image/png;base64,REPLACED_LOGO2">
<p>Minimal TK</p>
</div>

<div class="card">
<img src="data:image/jpeg;base64,REPLACED_LOGO1">
<p>Brand Signature</p>
</div>

</div>

</section>

<section class="section" id="shop">

<h2>Shop</h2>

<div class="grid" id="shopGrid"></div>

</section>

<section class="section" id="checkout">

<h2>Checkout</h2>

<div id="checkoutItems"></div>

<h3 id="total">Total: £0</h3>

<button onclick="completeOrder()">Complete Purchase</button>

</section>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="cartTotal">Total: £0</h3>

</div>

<footer>
TK Clothing © 2026
</footer>

<script>

const logo1="data:image/jpeg;base64,REPLACED_LOGO1"
const logo2="data:image/png;base64,REPLACED_LOGO2"

const products=[
{name:"TK Hoodie",price:18,logo:logo2},
{name:"Joggers",price:18,logo:logo2},
{name:"Cargo Pants",price:14.99,logo:logo2},
{name:"Tank Top",price:8,logo:logo2},
{name:"Leggings",price:12,logo:logo2},
{name:"Tracksuit",price:18,logo:logo2}
]

let cart=[]

function renderProducts(){

const grid=document.getElementById("shopGrid")

products.forEach(p=>{

grid.innerHTML+=`

<div class="product">

<img class="product-logo" src="${p.logo}">

<h3>${p.name}</h3>

<div class="price">£${p.price}</div>

<button onclick="addToCart('${p.name}',${p.price})">
Add to Cart
</button>

</div>

`

})

}

function toggleCart(){
document.getElementById("cart").classList.toggle("open")
}

function addToCart(name,price){
cart.push({name,price})
renderCart()
}

function renderCart(){

let items=document.getElementById("cartItems")
let checkout=document.getElementById("checkoutItems")

items.innerHTML=""
checkout.innerHTML=""

let total=0

cart.forEach(item=>{
total+=item.price

items.innerHTML+=`<div class="cart-item">${item.name} - £${item.price}</div>`
checkout.innerHTML+=`<div>${item.name} - £${item.price}</div>`
})

document.getElementById("cartTotal").innerText="Total: £"+total.toFixed(2)
document.getElementById("total").innerText="Total: £"+total.toFixed(2)

}

function completeOrder(){

if(cart.length===0){
alert("Cart empty")
return
}

alert("Order completed!")

cart=[]
renderCart()

}

renderProducts()

</script>

</body>
</html>
