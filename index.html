<!DOCTYPE html>
<html>
<head>
  <title>TK Clothing</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;

    }

      margin-top: 40px;
    }
    .product {
      margin: 20px;
      padding: 20px;
      border: 1px solid #444;
      display: inline-block;
    }
    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>TK Clothing</h1>
  <p>Built for the gym. Built for you.</p>

  <h2>Products</h2>

  <div class="product">
    <h3>TK Hoodie</h3>
    <p>£40</p>
    <button>Buy Now</button>
  </div>

  <div class="product">
    <h3>TK T-Shirt</h3>
    <p>£25</p>
    <button>Buy Now</button>
  </div>

</body>
</html>
